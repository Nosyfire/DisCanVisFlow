# DisCanVis full-proteome update
# Run: nextflow run main.nf --project projects/full_discanvis.yaml -profile discanvis_data,conda -resume

name: full_discanvis
description: "Full human proteome — all annotation tracks for DisCanVis2 database update"
version: "2026-q4"

# ── Gene scope ────────────────────────────────────────────────────────────────
target_genes: null          # null = all 19,627 SwissProt human proteins
mapping_mode: all_isoform_mapping

# ── Tracks ────────────────────────────────────────────────────────────────────
tracks:
  mutations: true
  clinvar_disease: true
  disorder: true            # IUPred3 + ANCHOR2 + AIUPred + AlphaFold pLDDT
  slim_annotations: true   # ELM + DIBS + MFIB + PhasePro + PTM + Pfam + UniProt
  pdb: true
  go_terms: true
  polymorphism: true
  pathogenicity: true       # dbNSFP pre-mapped
  alphamissense: true
  mavedb: true
  proteingym: true
  cancer_drivers: true
  disease: true             # ClinVar disease + OMIM
  depmap: true
  conservation: false       # needs local GOPHER table — enable with gopher_conservation_table
  coiled_coils: false       # DeepCoil: incompatible with CUDA 12+ (Blackwell)
  ppi: true
  scansite: true
  pem: true
  finches: false            # CC BY-NC 4.0 — enable with skip_finches: false

# ── Mutation source ───────────────────────────────────────────────────────────
mutation_source: ClinVar    # auto-downloaded; override with clinvar_vcf: /path/to/vcf.gz

# ── Compute ───────────────────────────────────────────────────────────────────
scatter_chunks: 20          # parallel DISORDER_MAP chunks (matches GPU count × tasks)
blat_chunks: 16

# ── Output ───────────────────────────────────────────────────────────────────
outdir: "results/discanvis"
per_gene_md_threshold: 50   # use mapping_coverage.tsv for full proteome
