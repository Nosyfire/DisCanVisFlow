# VEP benchmarking — mutations + pathogenicity scores, full proteome
# Run: nextflow run main.nf --project projects/vep_benchmarking.yaml -profile discanvis_data,conda -resume

name: vep_benchmarking
description: "Full proteome: mutations + all pathogenicity predictors for VEP benchmarking"
version: "2026-q4"

target_genes: null
mapping_mode: all_isoform_mapping

tracks:
  mutations: true
  clinvar_disease: true
  disorder: false
  slim_annotations: false
  pdb: false
  go_terms: false
  polymorphism: false
  pathogenicity: true
  alphamissense: true
  mavedb: true
  proteingym: true
  cancer_drivers: false
  disease: false
  depmap: false
  conservation: false
  coiled_coils: false
  ppi: false
  scansite: false
  pem: false
  finches: false

mutation_source: ClinVar
scatter_chunks: 1
blat_chunks: 16
outdir: "results/vep_benchmarking"
per_gene_md_threshold: 50
